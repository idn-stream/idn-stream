<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getDatabase,
ref,
set,
push,
onValue,
onDisconnect,
remove
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {

apiKey:"AIzaSyC74Y5s8whuuhV3hy9lfBdAow39sa31fTk",

authDomain:"idn-stream.firebaseapp.com",

databaseURL:"https://idn-stream-default-rtdb.asia-southeast1.firebasedatabase.app",

projectId:"idn-stream",

storageBucket:"idn-stream.firebasestorage.app",

messagingSenderId:"259123335993",

appId:"1:259123335993:web:1eef9849deaf8d0fae4ee8"

};

const app = initializeApp(firebaseConfig);

const db = getDatabase(app);

const ROOM_ID = "belgium-senegal";

window.firebaseDB=db;
window.firebaseRef=ref;
window.firebaseSet=set;
window.firebasePush=push;
window.firebaseOnValue=onValue;
window.firebaseOnDisconnect=onDisconnect;

// ===== REALTIME VIEWER =====

const userId = crypto.randomUUID();

const viewerRef = ref(db, "viewers/" + ROOM_ID + "/" + userId);

// Tambahkan user ke daftar viewer
set(viewerRef, {
    online: true,
    time: Date.now()
});

// Hapus otomatis saat user keluar
onDisconnect(viewerRef).remove();

// Update jumlah viewer
onValue(ref(db, "viewers/" + ROOM_ID), (snapshot) => {
    let total = 0;

    if (snapshot.exists()) {
        total = snapshot.size || Object.keys(snapshot.val()).length;
    }

    document.getElementById("viewerCount").textContent = total;

});

// ===== NAMA USER =====

let username = localStorage.getItem("username");

if (!username) {

    username = "Guest" + Math.floor(Math.random() * 9999);

    localStorage.setItem("username", username);

}

document.getElementById("userName").textContent = username;

const EXPIRE_TIME = 6 * 60 * 60 * 1000;

onValue(ref(db, "chat/" + ROOM_ID), (snapshot) => {
    if (!snapshot.exists()) return;

    const now = Date.now();

    Object.entries(snapshot.val()).forEach(([key, msg]) => {
        if (now - msg.time > EXPIRE_TIME) {
            remove(ref(db, "chat/" + ROOM_ID + "/" + key));
        }
    });
});

// ===== LIVE CHAT =====

const msgInput = document.getElementById("messageInput");
const sendBtn = document.getElementById("sendBtn");
const messagesDiv = document.getElementById("messages");

let lastSend = 0;

// Tampilkan pesan
onValue(ref(db, "chat/" + ROOM_ID), (snapshot) => {

    messagesDiv.innerHTML = "";

    if (!snapshot.exists()) return;

    const data = snapshot.val();

    Object.values(data).forEach(msg => {

        const div = document.createElement("div");

        div.className = "msg";

        const time = new Date(msg.time).toLocaleTimeString("id-ID", {
            hour: "2-digit",
            minute: "2-digit"
        });

        div.innerHTML = `
            <span class="msg-name">${msg.user}</span>
            <span class="msg-time">${time}</span><br>
            ${msg.text}
        `;

        messagesDiv.appendChild(div);

    });

    messagesDiv.scrollTop = messagesDiv.scrollHeight;

});

// Kirim pesan
sendBtn.onclick = () => {

const text = msgInput.value.trim();

if (text === "") return;

if (Date.now() - lastSend < 5000) {
    alert("Tunggu 5 detik sebelum mengirim lagi.");
    return;
}

if (text.length > 200) {
    alert("Maksimal 200 karakter.");
    return;
}

const badWords = [
"anjing",
"bangsat",
"kontol",
"memek",
"ngentot",
"tolol"
];

let filtered = text;

badWords.forEach(word => {
    filtered = filtered.replaceAll(
        new RegExp(word, "gi"),
        "****"
    );
});

    lastSend = Date.now();

    push(ref(db, "chat/" + ROOM_ID), {    

        user: username,

        text: filtered,

        time: Date.now()

    });

    msgInput.value = "";

};

msgInput.addEventListener("keypress", (e) => {

    if (e.key === "Enter") {

        sendBtn.click();

    }

});

</script>

<script>

const player = videojs('videoPlayer',{
autoplay:true,
muted:true,
fluid:true
});


player.on('fullscreenchange', function () {
    if (player.isFullscreen()) {
        if (screen.orientation && screen.orientation.lock) {
            screen.orientation.lock('landscape').catch(() => {});
        }
    } else {
        if (screen.orientation && screen.orientation.unlock) {
            screen.orientation.unlock();
        }
    }
});



function loadChannel(url){

player.src({
src:url,
type:'application/x-mpegURL'
});

player.play().catch(()=>{});

}

const buttons=document.querySelectorAll('.channel-btn');

buttons.forEach(btn=>{

btn.addEventListener('click',()=>{

buttons.forEach(b=>b.classList.remove('active'));

btn.classList.add('active');

loadChannel(btn.dataset.url);

});

});

window.onload=()=>{

loadChannel(
document.querySelector('.channel-btn.active').dataset.url
);

};

</script>
